<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perímetro y Área de un cuadrado</title>
</head>
<body>
    <h1>Cálculo del Perímetro y Área de un Cuadrado</h1>
    <script type="text/javascript">
        let l = parseFloat(prompt("Introduce la longitud de un lado"));
        document.write("El perimetro es: " + (l*4) + "<br>");
        document.write("El área es: " + (l*l));

    </script>
</body>
</html>
