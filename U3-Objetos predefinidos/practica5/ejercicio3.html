<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Interés Simple</title>
</head>
<body>
    <h1>Calculadora de Interés Simple (Préstamos)</h1>
    <script type="text/javascript">
        let c = parseFloat(prompt("Introduce un capital inicial")),
            r = parseFloat(prompt("Introduce una tasa de intere anual")),
            t = parseFloat(prompt("Introduce un numero de años"));
        document.write("El interes es: " + ((c * (r/100))*t));

    </script>
</body>
</html>
