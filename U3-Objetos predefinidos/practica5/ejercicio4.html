<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de unidades de longitud</title>
</head>
<body>
    <h1>Conversor de Unidades (Metros a Centímetros y a Kilómetros)</h1>
    <script type="text/javascript">
        let d = parseFloat(prompt("Introduce una distancia en metros")),
            cm = d * 100,
            km = d / 1000;
        document.write("La distancia en metros es: " + d + " metros <br>" + " La distnacia en centimetros es: " + cm + " centimetros <br>"  + " La distancia en kilometros es: " + km + " kilometros");

    </script>
</body>
</html>
