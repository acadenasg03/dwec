<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Básico de Temperaturas (°C a °F)</title>
</head>
<body>
    <h1>Conversor de Temperatura: Celsius a Fahrenheit</h1>
    <script type="text/javascript">
        let c = parseFloat(prompt("Introdue una temperatura en Celsius"));
        document.write("En Fahrenheit serian " + ((c*(9/5))+32));

    </script>
</body>
</html>
