<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de superficie</title>
</head>
<body>
    <h1>CALCULO DE LA SUPERFICIE EN METROS CUADRADOS</h1>
    <script type="text/javascript">
        let h = parseFloat(prompt("Introduce una altura en metros")),
            a = parseFloat(prompt("Introduce una anchura en metros"));
        document.write("El resultado es: " + (h*a));

    </script>
    
</body>
</html>
