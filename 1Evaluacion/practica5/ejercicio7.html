<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el número</title>
</head>
<body>
    <h1>Adivina el número (entre 1 y 10)</h1>
    <script type="text/javascript">
        let nAleatorio = Math.floor(Math.random() * 10) + 1,
            n = parseInt(prompt("Introduce el numero a adivinar")),
            intento = 1;
        while (n != nAleatorio) {
            intento++;
            if (n > nAleatorio) {
                alert("El numero a adivinar es mas pequeño");
            }
            else{
                alert("El numero a adivinar es mas grande");
            }
            n = parseInt(prompt("Introduce el numero a adivinar"));
        }
        document.write("Has acertado, el numero a adivinar era " + nAleatorio + "<br>");
        document.write("Numero de intentos: " + intento);
    </script>
</body>
</html>
