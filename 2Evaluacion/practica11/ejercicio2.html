<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
</head>
<body>
      <script>
            function cambioParrafo(){
                  let par = document.getElementById("info");
                  par.innerHTML = "El contenido ha sido actualizado mediante DOM.";
            }

      </script>
      <p id="info">Texto ejemplo para el ejercicio</p>
      <button onclick="cambioParrafo()">Pulsar</button>
</body>
</html>
