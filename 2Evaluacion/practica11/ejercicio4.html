<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
</head>
<body>
      <script>

            function eliminarUltimoLI(){
                  let lista = document.getElementById("lista");
                  let li = lista.lastChild;
                  lista.removeChild(li);
            }

      </script>
      <ul id="lista">
            <li>Elemento 1</li>
            <li>Elemento 2</li>
            <li>Elemento 3</li>
            <li>Elemento 4</li>
            <li>Elemento 5</li>
            <li>Elemento 6</li>
            <li>Elemento 7</li>
            <li>Elemento 8</li>
            <li>Elemento 9</li>
      </ul>
      <button onclick="eliminarUltimoLI()">Eliminar Ultimo</button>
</body>
</html>
