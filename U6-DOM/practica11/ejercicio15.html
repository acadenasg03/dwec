<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
</head>
<body>
      <div style="background-color: blue; width: 100px; height: 100px;" id="divC"></div>
      <script>
            document.getElementById("divC").addEventListener("mouseover",function(){
                  document.getElementById("divC").style.backgroundColor = "orange";
            })
            document.getElementById("divC").addEventListener("mouseout",function(){
                  document.getElementById("divC").style.backgroundColor = "blue";
            })
      </script>
</body>
</html>
