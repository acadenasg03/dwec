<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
</head>
<body>
      <img id="foto" src="./imgVehiculos/coche.png" alt="coche" width="100"><br>
      <button id="btn" onclick="agrandar()">Agrandar</button>
      <script>
            let cont = 0;
            function agrandar(){
                  cont++;

                  let anchura = document.getElementById("foto").getAttribute("width");
                  anchura = parseInt(anchura) + parseInt(anchura * 0.5);
                  console.log(anchura);
                  document.getElementById("foto").setAttribute("width",anchura);
                  if (cont == 3) {
                        document.getElementById("btn").setAttribute("hidden",true);
                  }
            }
      </script>
</body>
</html>
